<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde FIFA 2026 — Planning des Matchs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #161f33;
    --border: #1e2d4a;
    --accent: #c9a227;
    --accent2: #1d6fa4;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --text: #e8eaf0;
    --muted: #7b8ba0;
    --live: #ff3b3b;
    --upcoming: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0a0f1e 0%, #0d1b35 50%, #0a1929 100%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,162,39,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(201,162,39,0.15);
    border: 1px solid rgba(201,162,39,0.4);
    border-radius: 20px;
    padding: 0.3rem 1rem;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.2rem;
  }
  .hero-badge::before { content: '⚽'; font-size: 0.9rem; }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: #fff;
    margin-bottom: 0.6rem;
  }
  .hero h1 span { color: var(--accent); }
  .hero-sub {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-top: 1.8rem;
    flex-wrap: wrap;
  }
  .hero-stat { text-align: center; }
  .hero-stat .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    display: block;
    line-height: 1;
  }
  .hero-stat .lbl {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  /* NAV TABS */
  .tabs-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,15,30,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    gap: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 1rem 1.2rem;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }
  .section { display: none; }
  .section.active { display: block; }

  /* PHASE HEADER */
  .phase-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem 0 1.2rem;
  }
  .phase-header:first-child { margin-top: 0; }
  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    white-space: nowrap;
  }
  .phase-line { flex: 1; height: 1px; background: var(--border); }

  /* DATE HEADER */
  .date-header {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 0.5rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .date-header::after { content: ''; flex: 1; height: 1px; background: var(--border); opacity: 0.5; }

  /* MATCH CARD */
  .matches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .match-card:hover { border-color: #2a3f6a; transform: translateY(-1px); }
  .match-card.played { border-left: 3px solid var(--green); }
  .match-card.upcoming { border-left: 3px solid var(--upcoming); }
  .match-card.today { border-left: 3px solid var(--orange); }

  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }
  .match-group {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
  }
  .match-status {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.55rem;
    border-radius: 4px;
  }
  .status-played { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-upcoming { background: rgba(59,130,246,0.15); color: var(--upcoming); }
  .status-today { background: rgba(249,115,22,0.15); color: var(--orange); }

  .match-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0.5rem;
  }
  .team { display: flex; flex-direction: column; }
  .team.home { align-items: flex-start; }
  .team.away { align-items: flex-end; }
  .team-flag { font-size: 1.5rem; line-height: 1; margin-bottom: 0.3rem; }
  .team-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 110px;
  }
  .team.home .team-name { text-align: left; }
  .team.away .team-name { text-align: right; }

  .score-box { text-align: center; flex-shrink: 0; }
  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    letter-spacing: 0.08em;
    color: #fff;
    line-height: 1;
  }
  .score .sep { color: var(--muted); margin: 0 0.1rem; }
  .match-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .match-venue {
    margin-top: 0.8rem;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .match-venue::before { content: '📍'; font-size: 0.7rem; }

  /* GROUPS GRID */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-title {
    background: rgba(201,162,39,0.1);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-teams { padding: 0.5rem 0; }
  .group-team {
    display: grid;
    grid-template-columns: 1.2rem 1.4rem 1fr auto auto auto;
    gap: 0.4rem;
    align-items: center;
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .group-team:last-child { border-bottom: none; }
  .group-team:hover { background: rgba(255,255,255,0.03); }
  .team-pos { color: var(--muted); font-size: 0.7rem; font-weight: 700; }
  .team-fl { font-size: 0.95rem; }
  .team-nm { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team-pts {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 1.5rem;
    text-align: right;
  }
  .team-gd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 2rem;
    text-align: right;
  }
  .team-played {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 1rem;
    text-align: right;
  }
  .qual-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-left: 0.3rem;
  }
  .qual-green { background: var(--green); }
  .qual-orange { background: var(--orange); }

  /* KNOCKOUT BRACKET */
  .bracket-phase {
    margin-bottom: 2.5rem;
  }
  .bracket-matches {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0.8rem;
  }
  .bracket-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
  }
  .bracket-card .match-num {
    font-size: 0.6rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .bracket-team {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    font-size: 0.83rem;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-team .tbd { color: var(--muted); font-style: italic; font-size: 0.75rem; }
  .b-score {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .bracket-date {
    font-size: 0.63rem;
    color: var(--muted);
    margin-top: 0.5rem;
    display: flex;
    justify-content: space-between;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  @media (max-width: 600px) {
    .hero h1 { font-size: 2.8rem; }
    .matches-grid { grid-template-columns: 1fr; }
    .groups-grid { grid-template-columns: 1fr; }
    .bracket-matches { grid-template-columns: 1fr; }
  }
</style>
</head>

// ---- RENDER GROUPS ----
function renderGroups() {
  const container = document.getElementById('groups-container');
  Object.entries(GROUPS).forEach(([letter, data]) => {
    const sorted = [...data.teams].sort((a,b) => b.pts - a.pts || b.gd - a.gd);
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-title">
        <span>GROUPE ${letter}</span>
        <span style="font-size:0.7rem;color:var(--muted);font-family:Inter;font-weight:400;letter-spacing:0">
          ${data.teams[0].j > 0 ? data.teams[0].j + 'J joué' : 'À venir'}
        </span>
      </div>
      <div class="group-teams">
        <div style="display:grid;grid-template-columns:1.2rem 1.4rem 1fr 2rem 2rem 2rem;gap:0.4rem;padding:0.3rem 1rem;font-size:0.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em">
          <span>#</span><span></span><span>Équipe</span><span style="text-align:right">J</span><span style="text-align:right">DB</span><span style="text-align:right">Pts</span>
        </div>
        ${sorted.map((t, i) => `
          <div class="group-team">
            <span class="team-pos">${i+1}</span>
            <span class="team-fl">${t.flag}</span>
            <span class="team-nm">${t.name}</span>
            <span class="team-played">${t.j}</span>
            <span class="team-gd">${t.gd > 0 ? '+'+t.gd : t.gd}</span>
            <span class="team-pts">${t.pts}</span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

// ---- RENDER SCHEDULE ----
function getStatus(dateStr) {
  const d = new Date(dateStr);
  if (d < TODAY) return 'played';
  if (d.toDateString() === TODAY.toDateString()) return 'today';
  return 'upcoming';
}

function frDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} 2026`;
}

function renderSchedule() {
  const container = document.getElementById('schedule-container');
  
  // Group by date
  const byDate = {};
  MATCHES.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  const header = document.createElement('div');
  header.innerHTML = `<div class="phase-header"><span class="phase-label">Phase de Groupes — 11 juin au 27 juin</span><span class="phase-line"></span></div>`;
  container.appendChild(header);

  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Match joué</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Aujourd'hui</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--upcoming)"></div> À venir</div>
  `;
  container.appendChild(legend);

  Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).forEach(([date, matches]) => {
    const dh = document.createElement('div');
    dh.className = 'date-header';
    dh.textContent = frDate(date);
    container.appendChild(dh);

    const grid = document.createElement('div');
    grid.className = 'matches-grid';

    matches.forEach(m => {
      const status = getStatus(m.date);
      const played = m.hs !== null;
      const card = document.createElement('div');
      card.className = `match-card ${status}`;
      card.innerHTML = `
        <div class="match-meta">
          <span class="match-group">Groupe ${m.group}</span>
          <span class="match-status ${status === 'played' ? 'status-played' : status === 'today' ? 'status-today' : 'status-upcoming'}">
            ${status === 'played' ? 'Terminé' : status === 'today' ? "Aujourd'hui" : 'À venir'}
          </span>
        </div>
        <div class="match-teams">
          <div class="team home">
            <div class="team-flag">${m.hFlag}</div>
            <div class="team-name">${m.home}</div>
          </div>
          <div class="score-box">
            ${played
              ? `<div class="score">${m.hs}<span class="sep">-</span>${m.as}</div>`
              : `<div class="match-time">${m.time}</div>`
            }
          </div>
          <div class="team away">
            <div class="team-flag">${m.aFlag}</div>
            <div class="team-name">${m.away}</div>
          </div>
        </div>
        <div class="match-venue">${m.venue}</div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

        <div class="bracket-team">
          <span>${m.home}</span>
          <span class="b-score tbd">—</span>
        </div>
        <div class="bracket-team">
          <span>${m.away}</span>
          <span class="b-score tbd">—</span>
        </div>
        <div class="bracket-date"><span style="color:var(--muted)">📍 ${m.venue}</span></div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

// ---- TABS ----
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// ---- INIT ----
renderGroups();
renderSchedule();
renderKnockout();
</script>
